# -----------------------------
# Website Configuration
# -----------------------------

theme: jekyll-theme-chirpy

# Language of the site
lang: en

# Timezone
timezone: Asia/Kolkata

# -----------------------------
# Basic Website Information
# -----------------------------

title: Somdatt Prajapat

tagline: Nuclear Physics Researcher | Gamma-Ray Spectroscopy | Detector Systems

description: >
  Personal research website of Somdatt Prajapat. Nuclear physics researcher working
  on gamma-ray spectroscopy, nuclear structure, detector development, and
  experimental spectroscopy using HPGe Clover detectors and Python-based analysis.

# Your website URL
url: "https://somgithu.github.io"

# If repository name is not username.github.io keep baseurl
baseurl: ""

# -----------------------------
# GitHub Information
# -----------------------------

github:
  username: somgithu

# -----------------------------
# Social Profile Information
# -----------------------------

social:
  name: Somdatt Prajapat
  email: somdpr415@email.com
  links:
    - https://github.com/somgithu
    - https://www.linkedin.com/in/somdatt-prajapat

# -----------------------------
# Profile Image
# -----------------------------

avatar: /assets/profile.png

# -----------------------------
# Theme Appearance
# -----------------------------

theme_mode: dark

# -----------------------------
# SEO / Google indexing
# -----------------------------

webmaster_verifications:
  google:
  bing:

# -----------------------------
# Analytics (leave empty now)
# -----------------------------

analytics:
  google:
    id:

# -----------------------------
# Table of Contents in posts
# -----------------------------

toc: true

# -----------------------------
# Comments System (optional)
# -----------------------------

comments:
  provider:

# -----------------------------
# Progressive Web App
# -----------------------------

pwa:
  enabled: true
  cache:
    enabled: true

# -----------------------------
# Pagination
# -----------------------------

paginate: 10

# -----------------------------
# Jekyll Settings
# -----------------------------

kramdown:
  footnote_backlink: "&#8617;&#xfe0e;"
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    css_class: highlight
    block:
      line_numbers: true
      start_line: 1

# -----------------------------
# Collections (tabs/pages)
# -----------------------------

collections:
  tabs:
    output: true
    sort_by: order

defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: post
      comments: true
      toc: true
      permalink: /posts/:title/

  - scope:
      path: ""
      type: tabs
    values:
      layout: page
      permalink: /:title/

# -----------------------------
# Sass Settings
# -----------------------------

sass:
  style: compressed

# -----------------------------
# Files to Ignore
# -----------------------------

exclude:
  - "*.gem"
  - "*.gemspec"
  - docs
  - tools
  - README.md
  - LICENSE
